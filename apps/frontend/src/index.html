<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Iranian Oral History</title>
    <meta
      name="description"
      content="Digitales Archiv der iranischen Zeitgeschichte – persönliche Zeugnisse, aufgezeichnete Erinnerungen und lebendige Stimmen."
    />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFFFCC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1512" media="(prefers-color-scheme: dark)" />
    <!-- Farbschema vor dem ersten Paint setzen (kein Flash of Light beim Night-Modus).
         Muss mit ThemeService (STORAGE_KEY 'ioh-theme') übereinstimmen. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ioh-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Estedad:wght@300;400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Kalameh:wght@300;400;500;700&family=Lalezar&family=Vazirmatn:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>

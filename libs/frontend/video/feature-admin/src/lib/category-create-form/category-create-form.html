<div class="admin-card">
  <div class="admin-card__header">
    <h5 class="admin-card__title">{{ i18n.t('ADMIN.CAT.FORM_TITLE') }}</h5>
  </div>
  <div class="admin-card__body">
    @if (form.error()) {
      <div class="admin-alert admin-alert--danger">{{ form.error() }}</div>
    }
    @if (form.success()) {
      <div class="admin-alert admin-alert--success">{{ form.success() }}</div>
    }

    <div class="admin-form-grid admin-form-grid--cat">
      <div class="admin-field">
        <label class="admin-label" for="cat-slug">{{ i18n.t('ADMIN.CAT.SLUG_LABEL') }}</label>
        <input id="cat-slug" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.CAT.SLUG_PH')"
          [value]="slug()" (input)="slug.set($any($event.target).value)" />
        <span class="admin-hint">{{ i18n.t('ADMIN.CAT.SLUG_HINT') }}</span>
      </div>

      <div class="admin-field admin-field--order">
        <label class="admin-label" for="cat-order">{{ i18n.t('ADMIN.CAT.ORDER_LABEL') }}</label>
        <input id="cat-order" class="admin-input" type="number" min="0" placeholder="0"
          [value]="sortOrder()" (input)="sortOrder.set(+$any($event.target).value)" />
      </div>
    </div>

    <fieldset class="admin-fieldset">
      <legend class="admin-fieldset__legend">{{ i18n.t('ADMIN.CAT.NAME_LEGEND') }}</legend>
      <div class="admin-lang-grid">
        <div class="admin-field">
          <label class="admin-label" for="cat-name-de">{{ i18n.t('ADMIN.LANG_DE') }}</label>
          <input id="cat-name-de" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.LANG_DE')"
            [value]="nameDe()" (input)="nameDe.set($any($event.target).value)" />
        </div>
        <div class="admin-field">
          <label class="admin-label" for="cat-name-en">{{ i18n.t('ADMIN.LANG_EN') }}</label>
          <input id="cat-name-en" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.LANG_EN')"
            [value]="nameEn()" (input)="nameEn.set($any($event.target).value)" />
        </div>
        <div class="admin-field">
          <label class="admin-label" for="cat-name-fa">{{ i18n.t('ADMIN.LANG_FA') }}</label>
          <input id="cat-name-fa" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.LANG_FA')" dir="rtl"
            [value]="nameFa()" (input)="nameFa.set($any($event.target).value)" />
        </div>
      </div>
    </fieldset>

    <fieldset class="admin-fieldset">
      <legend class="admin-fieldset__legend">
        {{ i18n.t('ADMIN.CAT.DESC_LEGEND') }}
        <span class="admin-optional">{{ i18n.t('ADMIN.OPTIONAL') }}</span>
      </legend>
      <div class="admin-lang-grid">
        <div class="admin-field">
          <label class="admin-label" for="cat-desc-de">{{ i18n.t('ADMIN.LANG_DE') }}</label>
          <textarea id="cat-desc-de" class="admin-input admin-textarea" rows="2"
            [value]="descDe()" (input)="descDe.set($any($event.target).value)"></textarea>
        </div>
        <div class="admin-field">
          <label class="admin-label" for="cat-desc-en">{{ i18n.t('ADMIN.LANG_EN') }}</label>
          <textarea id="cat-desc-en" class="admin-input admin-textarea" rows="2"
            [value]="descEn()" (input)="descEn.set($any($event.target).value)"></textarea>
        </div>
        <div class="admin-field">
          <label class="admin-label" for="cat-desc-fa">{{ i18n.t('ADMIN.LANG_FA') }}</label>
          <textarea id="cat-desc-fa" class="admin-input admin-textarea" rows="2" dir="rtl"
            [value]="descFa()" (input)="descFa.set($any($event.target).value)"></textarea>
        </div>
      </div>
    </fieldset>

    <div class="admin-actions">
      <button class="admin-btn admin-btn--primary" (click)="submit()" [disabled]="form.isLoading()">
        @if (form.isLoading()) {
          <span class="admin-spinner" aria-hidden="true"></span>
        }
        {{ form.isLoading() ? i18n.t('ADMIN.CAT.SAVING') : i18n.t('ADMIN.CAT.SAVE') }}
      </button>
    </div>
  </div>
</div>

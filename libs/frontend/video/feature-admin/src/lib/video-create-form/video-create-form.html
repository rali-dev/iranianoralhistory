<div class="admin-card">
  <div class="admin-card__header">
    <h5 class="admin-card__title">{{ i18n.t('ADMIN.VIDEO.FORM_TITLE') }}</h5>
  </div>
  <div class="admin-card__body">
    @if (form.error()) {
      <div class="admin-alert admin-alert--danger">{{ form.error() }}</div>
    }
    @if (form.success()) {
      <div class="admin-alert admin-alert--success">{{ form.success() }}</div>
    }

    <div class="admin-field">
      <label class="admin-label" for="video-vimeo">{{ i18n.t('ADMIN.VIDEO.VIMEO_LABEL') }}</label>
      <input id="video-vimeo" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.VIDEO.VIMEO_PH')"
        [value]="vimeoId()" (input)="vimeoId.set($any($event.target).value)" />
    </div>

    <fieldset class="admin-fieldset">
      <legend class="admin-fieldset__legend">{{ i18n.t('ADMIN.VIDEO.TITLE_LEGEND') }}</legend>
      <div class="admin-lang-grid">
        <div class="admin-field">
          <label class="admin-label" for="video-title-de">{{ i18n.t('ADMIN.LANG_DE') }}</label>
          <input id="video-title-de" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.LANG_DE')"
            [value]="titleDe()" (input)="titleDe.set($any($event.target).value)" />
        </div>
        <div class="admin-field">
          <label class="admin-label" for="video-title-en">{{ i18n.t('ADMIN.LANG_EN') }}</label>
          <input id="video-title-en" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.LANG_EN')"
            [value]="titleEn()" (input)="titleEn.set($any($event.target).value)" />
        </div>
        <div class="admin-field">
          <label class="admin-label" for="video-title-fa">{{ i18n.t('ADMIN.LANG_FA') }}</label>
          <input id="video-title-fa" class="admin-input" type="text" [placeholder]="i18n.t('ADMIN.LANG_FA')" dir="rtl"
            [value]="titleFa()" (input)="titleFa.set($any($event.target).value)" />
        </div>
      </div>
    </fieldset>

    <fieldset class="admin-fieldset">
      <legend class="admin-fieldset__legend">
        {{ i18n.t('ADMIN.VIDEO.DESC_LEGEND') }}
        <span class="admin-optional">{{ i18n.t('ADMIN.OPTIONAL') }}</span>
      </legend>
      <div class="admin-lang-grid">
        <div class="admin-field">
          <label class="admin-label" for="video-desc-de">{{ i18n.t('ADMIN.LANG_DE') }}</label>
          <textarea id="video-desc-de" class="admin-input admin-textarea" rows="3"
            [value]="descDe()" (input)="descDe.set($any($event.target).value)"></textarea>
        </div>
        <div class="admin-field">
          <label class="admin-label" for="video-desc-en">{{ i18n.t('ADMIN.LANG_EN') }}</label>
          <textarea id="video-desc-en" class="admin-input admin-textarea" rows="3"
            [value]="descEn()" (input)="descEn.set($any($event.target).value)"></textarea>
        </div>
        <div class="admin-field">
          <label class="admin-label" for="video-desc-fa">{{ i18n.t('ADMIN.LANG_FA') }}</label>
          <textarea id="video-desc-fa" class="admin-input admin-textarea" rows="3" dir="rtl"
            [value]="descFa()" (input)="descFa.set($any($event.target).value)"></textarea>
        </div>
      </div>
    </fieldset>

    <div class="admin-actions">
      <button class="admin-btn admin-btn--primary" (click)="submit()" [disabled]="form.isLoading()">
        @if (form.isLoading()) {
          <span class="admin-spinner" aria-hidden="true"></span>
        }
        {{ form.isLoading() ? i18n.t('ADMIN.VIDEO.SAVING') : i18n.t('ADMIN.VIDEO.SAVE') }}
      </button>
    </div>
  </div>
</div>
